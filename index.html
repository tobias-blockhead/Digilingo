<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Digitongue — Language Solutions Co.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@700&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Share+Tech+Mono&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #060c18;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow-x: hidden;
}

#starCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.scene {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 420px;
}

/* Geometry canvas behind badge */
.geo-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

#geoCanvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

/* Badge sits on top of geometry */
.badge {
  position: relative;
  z-index: 2;
  width: 56%;
  background: linear-gradient(180deg, #0d1726, #08101e);
  border: 2.5px solid;
  border-image: linear-gradient(135deg, #6b5030, #d4a862, #8b6840, #d4a862, #6b5030) 1;
  padding: 16px 8px 12px;
  touch-action: none;
  user-select: none;
  cursor: pointer;
  filter: drop-shadow(0 6px 32px rgba(0,0,0,0.9));
}

/* Side diamonds */
.badge-diamond-l, .badge-diamond-r {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #d4a862;
  font-size: 12px;
  opacity: 0.5;
}
.badge-diamond-l { left: -18px; }
.badge-diamond-r { right: -18px; }

.badge-top-diamond, .badge-bot-diamond {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  color: #d4a862;
  font-size: 10px;
  opacity: 0.55;
}
.badge-top-diamond { top: -14px; }
.badge-bot-diamond { bottom: -14px; }

/* Word display */
.word-display {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
  padding: 6px 4px 10px;
  min-height: 50px;
  letter-spacing: 0.05em;
}

.chunk {
  flex: 0 0 10%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.chunk-letter {
  width: 100%;
  text-align: center;
}

.chunk-letter {
  font-family: 'Cormorant SC', serif;
  font-weight: 700;
  font-size: clamp(18px, 5.2vw, 36px);
  line-height: 1;
  color: #b8c8d8;
  transition: all 0.15s ease;
}

.chunk-bar {
  height: 2px;
  width: 60%;
  background: rgba(212,168,98,0.2);
  border-radius: 1px;
  transition: all 0.15s;
}

.chunk.pressing .chunk-letter {
  color: #6a7a8a;
  transform: scale(0.9) translateY(4px);
  transition: all 0.08s ease-out;
}

.chunk.active .chunk-letter {
  color: #ffffff;
  transform: scale(1.15) translateY(-10px);
  text-shadow: 0 0 16px rgba(255,255,255,0.9), 0 0 32px rgba(200,220,240,0.5);
  transition: all 0.15s cubic-bezier(0.2, 0.8, 0.3, 1.5);
}
.chunk.active .chunk-bar {
  background: #d4a862;
  width: 100%;
  box-shadow: 0 0 6px rgba(212,168,98,0.6);
}

.chunk.visited .chunk-letter {
  color: #3a4a5a;
  transform: scale(1) translateY(0);
  transition: all 0.18s ease-out;
}

/* Subtitle area */
.badge-sub {
  text-align: center;
  margin-top: 6px;
}
.badge-sub-title {
  font-family: 'Cormorant SC', serif;
  font-size: 12px;
  letter-spacing: 5px;
  color: #d4a862;
  opacity: 0.85;
}
.badge-sub-est {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: #d4a862;
  opacity: 0.5;
  margin-top: 3px;
}

/* Phase bar */
.phase-wrap {
  width: 60%;
  max-width: 240px;
  height: 1px;
  background: rgba(200,208,216,0.05);
  overflow: hidden;
}
.phase-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #8b6840, #d4a862);
  transition: width 0.08s linear;
}

/* Waveform */
.waveform-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  height: 18px;
  width: 100%;
  max-width: 340px;
}
.wave-bar {
  width: 2px; height: 2px;
  background: rgba(200,208,216,0.07);
  border-radius: 1px;
  transition: height 0.05s ease;
}

.feedback {
  font-family: 'Cormorant SC', serif;
  font-size: 11px;
  letter-spacing: 5px;
  color: #d4a862;
  text-align: center;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.3s;
  min-height: 16px;
}
.feedback.show { opacity: 1; }

.instruction {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: #d4a862;
  text-align: center;
  text-transform: uppercase;
  opacity: 0.6;
}

.divider { display:flex; align-items:center; gap:12px; width:100%; max-width:300px; opacity:0.18; }
.div-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,#b88a54,transparent); }
.div-mark { font-size:7px; color:#b88a54; letter-spacing:2px; }

.tagline { text-align:center; }
.tagline-main { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(10px,2vw,13px); color:#c8d0d8; letter-spacing:1px; opacity:0.5; }
.tagline-sub { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:3px; color:#d4a862; text-transform:uppercase; margin-top:4px; opacity:0.35; }

/* Mode menu */
.mode-menu {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid rgba(212,168,98,0.2);
}

.mode-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  color: #8b6840;
  text-transform: uppercase;
  padding: 4px 8px;
  border: 1px solid rgba(212,168,98,0.25);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: transparent;
  -webkit-tap-highlight-color: transparent;
}

.mode-btn.active {
  color: #d4a862;
  border-color: #d4a862;
  background: rgba(212,168,98,0.08);
  box-shadow: 0 0 8px rgba(212,168,98,0.2);
}

.mode-divider {
  color: rgba(212,168,98,0.25);
  font-size: 8px;
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="epigraph" style="text-align:center;margin-bottom:8px;opacity:0.35;">
  <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(10px,2.5vw,14px);color:#c8d0d8;letter-spacing:2px;">
    "In the beginning was the Word"
  </div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:#d4a862;margin-top:4px;opacity:0.6;">
    JOHN 1:1
  </div>
</div>
<div class="scene">
  <div class="geo-wrap" id="geoWrap">
    <canvas id="geoCanvas"></canvas>

    <div class="badge" id="badge">
      <span class="badge-top-diamond">◆</span>
      <span class="badge-diamond-l">◆</span>
      <span class="badge-diamond-r">◆</span>
      <span class="badge-bot-diamond">◆</span>

      <div class="word-display" id="wordDisplay">
        <div class="chunk"><div class="chunk-letter">D</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">I</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">G</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">I</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">T</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">O</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">N</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">G</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">U</div><div class="chunk-bar"></div></div>
        <div class="chunk"><div class="chunk-letter">E</div><div class="chunk-bar"></div></div>
      </div>

      <div class="badge-sub">
        <div class="badge-sub-title" style="white-space:nowrap;font-size:10px;letter-spacing:3px;">LANGUAGE SOLUTIONS CO.</div>
        <div class="badge-sub-est">◆ EST. 2024 ◆</div>
      <div class="mode-menu">
        <button class="mode-btn" id="btnLetter">LETTER</button>
        <span class="mode-divider">◆</span>
        <button class="mode-btn active" id="btnSyllable">SYLLABLE</button>
        <span class="mode-divider">◆</span>
        <button class="mode-btn" id="btnWord">WORD</button>
      </div>
      </div>
    </div>
  </div>

  <div class="phase-wrap"><div class="phase-fill" id="phaseFill"></div></div>
  <div class="waveform-strip" id="waveform"></div>
  <div class="feedback" id="feedback"></div>
  <div class="instruction" id="instruction">tap or swipe right →</div>

  <div class="divider">
    <div class="div-line"></div><div class="div-mark">◆ ◆ ◆</div><div class="div-line"></div>
  </div>

  <div class="tagline">
    <div class="tagline-main">"Where every tongue finds its word."</div>
    <div class="tagline-sub">◆ Patent Pending · Language Solutions Co. ◆</div>
  </div>
</div>

<script>
// ── STARS ─────────────────────────────────────────────────────────────────────
const sc = document.getElementById('starCanvas');
const sctx = sc.getContext('2d');
let stars = [];

function initStars() {
  sc.width = window.innerWidth;
  sc.height = window.innerHeight;
  stars = [];
  const n = Math.floor((sc.width * sc.height) / 6000);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random()*sc.width, y: Math.random()*sc.height,
      r: Math.random()*0.7+0.1, a: Math.random()*0.18+0.03,
      phase: Math.random()*Math.PI*2, spd: Math.random()*0.001+0.0003
    });
  }
}

function drawStars(dt) {
  sctx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s => {
    s.phase += s.spd * dt;
    const alpha = s.a * (0.5 + 0.5*Math.sin(s.phase));
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sctx.fillStyle = `rgba(210,220,232,${alpha})`;
    sctx.fill();
  });
}

initStars();
window.addEventListener('resize', initStars);

// ── GEOMETRY ──────────────────────────────────────────────────────────────────
const gc_el = document.getElementById('geoCanvas');
const gctx = gc_el.getContext('2d');

const S  = 0.000030;
const S2 = S * 2;
const S3 = S * 1.35;
let a1=0, a2=0, a3=0;

function resizeGeo() {
  const wrap = document.getElementById('geoWrap');
  const size = wrap.offsetWidth;
  gc_el.width  = size;
  gc_el.height = size;
  gc_el.style.width  = size + 'px';
  gc_el.style.height = size + 'px';
}

function drawBottom(cx, cy, R, col) {
  const s = gc_el.width / 300;
  gctx.save(); gctx.translate(cx,cy); gctx.strokeStyle=col; gctx.fillStyle=col;
  const op=[], ip=[];
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2-Math.PI/6;
    op.push([Math.cos(a)*R*s,Math.sin(a)*R*s]);
    ip.push([Math.cos(a)*R*0.5*s,Math.sin(a)*R*0.5*s]);
  }
  gctx.lineWidth=1.8*s; gctx.beginPath();
  op.forEach(([x,y],i)=>i===0?gctx.moveTo(x,y):gctx.lineTo(x,y));
  gctx.closePath(); gctx.stroke();
  gctx.lineWidth=1.1*s;
  op.forEach(([x,y])=>{gctx.beginPath();gctx.moveTo(0,0);gctx.lineTo(x,y);gctx.stroke();});
  gctx.lineWidth=1.0*s; gctx.beginPath();
  ip.forEach(([x,y],i)=>i===0?gctx.moveTo(x,y):gctx.lineTo(x,y));
  gctx.closePath(); gctx.stroke();
  gctx.lineWidth=0.8*s;
  for(let i=0;i<6;i++){
    const [ix,iy]=ip[i];
    gctx.beginPath();gctx.moveTo(ix,iy);gctx.lineTo(op[i][0],op[i][1]);gctx.stroke();
    gctx.beginPath();gctx.moveTo(ix,iy);gctx.lineTo(op[(i+1)%6][0],op[(i+1)%6][1]);gctx.stroke();
  }
  op.forEach(([x,y])=>{gctx.beginPath();gctx.arc(x,y,1.3*s,0,Math.PI*2);gctx.fill();});
  ip.forEach(([x,y])=>{gctx.beginPath();gctx.arc(x,y,1.0*s,0,Math.PI*2);gctx.fill();});
  gctx.beginPath();gctx.arc(0,0,1.5*s,0,Math.PI*2);gctx.fill();
  gctx.restore();
}

function drawCenter(cx, cy, R, col) {
  const s = gc_el.width / 300;
  gctx.save(); gctx.translate(cx,cy);
  gctx.strokeStyle = col;
  gctx.lineWidth = 1.4 * s;
  const cr = R * s;
  gctx.beginPath(); gctx.arc(0,0,cr,0,Math.PI*2); gctx.stroke();
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2-Math.PI/2;
    gctx.beginPath(); gctx.arc(Math.cos(a)*cr,Math.sin(a)*cr,cr,0,Math.PI*2); gctx.stroke();
  }
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2-Math.PI/2;
    gctx.beginPath(); gctx.arc(Math.cos(a)*cr*2,Math.sin(a)*cr*2,cr,0,Math.PI*2); gctx.stroke();
  }
  gctx.restore();
}

function drawTop(cx, cy, R, col) {
  const s = gc_el.width / 300;
  gctx.save(); gctx.translate(cx,cy); gctx.strokeStyle=col; gctx.fillStyle=col; gctx.lineWidth=1.1*s;
  const outer=[], tips=[];
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2-Math.PI/6;
    outer.push([Math.cos(a)*R*s,Math.sin(a)*R*s]);
    tips.push([Math.cos(a)*R*1.42*s,Math.sin(a)*R*1.42*s]);
  }
  for(let i=0;i<6;i++){
    const j=(i+2)%6;
    gctx.beginPath();gctx.moveTo(outer[i][0],outer[i][1]);gctx.lineTo(outer[j][0],outer[j][1]);gctx.stroke();
    if(i<3){gctx.beginPath();gctx.moveTo(outer[i][0],outer[i][1]);gctx.lineTo(outer[i+3][0],outer[i+3][1]);gctx.stroke();}
  }
  for(let i=0;i<6;i++){
    gctx.beginPath();gctx.moveTo(tips[i][0],tips[i][1]);gctx.lineTo(outer[(i+5)%6][0],outer[(i+5)%6][1]);gctx.stroke();
    gctx.beginPath();gctx.moveTo(tips[i][0],tips[i][1]);gctx.lineTo(outer[(i+1)%6][0],outer[(i+1)%6][1]);gctx.stroke();
  }
  tips.forEach(([x,y])=>{gctx.beginPath();gctx.arc(x,y,1.2*s,0,Math.PI*2);gctx.fill();});
  outer.forEach(([x,y])=>{gctx.beginPath();gctx.arc(x,y,0.9*s,0,Math.PI*2);gctx.fill();});
  gctx.restore();
}

function drawRing(cx, cy, R) {
  const s = gc_el.width / 300;
  gctx.save(); gctx.translate(cx,cy);
  gctx.strokeStyle='rgba(192,148,75,0.45)'; gctx.lineWidth=0.5*s;
  gctx.beginPath(); gctx.arc(0,0,R*s,0,Math.PI*2); gctx.stroke();
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2-Math.PI/2;
    const major=i%3===0;
    const r1=R*(major?0.91:0.95)*s;
    gctx.lineWidth=(major?0.9:0.4)*s;
    gctx.beginPath();
    gctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
    gctx.lineTo(Math.cos(a)*R*s,Math.sin(a)*R*s);
    gctx.stroke();
    if(major){
      gctx.fillStyle='rgba(212,168,98,0.45)';
      gctx.beginPath();gctx.arc(Math.cos(a)*R*s,Math.sin(a)*R*s,1.5*s,0,Math.PI*2);gctx.fill();
    }
  }
  gctx.restore();
}

function getAlignment() {
  const d=Math.abs((a1+a3)%(Math.PI/3));
  const n=d<Math.PI/6?d:Math.PI/3-d;
  return Math.max(0,1-n/(Math.PI/18));
}

const alignGlow = { el: null };
const phaseFillEl = document.getElementById('phaseFill');
let lastT=0;

function frame(ts) {
  const dt=Math.min(ts-lastT,50); lastT=ts;
  a1-=S*dt; a2+=S2*dt; a3-=S3*dt;

  gctx.clearRect(0,0,gc_el.width,gc_el.height);
  const cx=gc_el.width/2, cy=gc_el.height/2;
  const R=gc_el.width*0.23, Rr=gc_el.width*0.34;

  const al=getAlignment();
  const b=al*0.14;
  const c1=`rgba(188,138,65,${0.82+b})`;
  const c3=`rgba(200,158,80,${0.78+b})`;

  gctx.save();gctx.translate(cx,cy);gctx.rotate(a1);gctx.translate(-cx,-cy);
  drawBottom(cx,cy,R,c1); gctx.restore();

  gctx.save();gctx.translate(cx,cy);gctx.rotate(a3);gctx.translate(-cx,-cy);
  drawTop(cx,cy,R,c3); gctx.restore();

  gctx.save();gctx.translate(cx,cy);gctx.rotate(a2);gctx.translate(-cx,-cy);
  drawCenter(cx,cy,gc_el.width*0.10,`rgba(212,168,98,${0.55+b*0.3})`); gctx.restore();

  drawRing(cx,cy,Rr);
  const tw = al*100; if(Math.abs(parseFloat(phaseFillEl.style.width||'0')-tw)>0.5) phaseFillEl.style.width=tw+'%';

  drawStars(dt);
  requestAnimationFrame(frame);
}

resizeGeo();
window.addEventListener('resize', resizeGeo);
requestAnimationFrame(frame);

// ── WAVEFORM ──────────────────────────────────────────────────────────────────
const wf = document.getElementById('waveform');
for(let i=0;i<40;i++){const b=document.createElement('div');b.className='wave-bar';wf.appendChild(b);}
let wvActive=false, wvTimer=null;

function animWave() {
  clearTimeout(wvTimer); wvActive=true;
  const bars=[...document.querySelectorAll('.wave-bar')];
  let f=0;
  function tick(){
    if(!wvActive)return;
    bars.forEach((b,i)=>{
      b.style.height=(2+Math.abs(Math.sin(f*0.25+i*0.35))*12+Math.random()*2)+'px';
      b.style.background='linear-gradient(180deg,#e8edf2,#8a9aaa)';
      b.style.opacity='0.35';
    });
    f++; if(f<55)requestAnimationFrame(tick); else stopWave();
  }
  requestAnimationFrame(tick);
  wvTimer=setTimeout(stopWave,800);
}
function stopWave(){
  wvActive=false;
  document.querySelectorAll('.wave-bar').forEach(b=>{b.style.height='2px';b.style.background='rgba(200,208,216,0.07)';b.style.opacity='1';});
}

// ── SWIPE MECHANIC ────────────────────────────────────────────────────────────
// ── MODES ─────────────────────────────────────────────────────────────────────
// LETTER mode: 10 chunks — D I G I T O N G U E
// SYLLABLE mode: 3 chunks — DIG | I | TONGUE
// WORD mode: 1 chunk — DIGITONGUE

const MODES = {
  letter: {
    chunks: ['D','I','G','I','T','O','N','G','U','E'],
    sounds: ['d','ih','jeh','ee','t','uh','n','guh','',''],
    label: 'LETTER'
  },
  syllable: {
    chunks: ['DIH','JIH','TONGUE'],
    audio: ['syl_dig','syl_i','syl_tongue'],
    sounds: ['syl_dih', 'syl_jih', 'syl_tongue'],
    label: 'SYLLABLE'
  },
  word: {
    chunks: ['DIGITONGUE'],
    sounds: ['syl_dih', 'syl_jih', 'syl_tongue'],
    label: 'WORD'
  }
};

let currentMode = 'syllable';

function buildChunks(mode) {
  const wd = document.getElementById('wordDisplay');
  wd.innerHTML = '';
  const data = MODES[mode];
  data.chunks.forEach((letter, i) => {
    const chunk = document.createElement('div');
    chunk.className = 'chunk';
    chunk.style.flex = mode === 'letter' ? '0 0 10%' : '1';
    const cl = document.createElement('div');
    cl.className = 'chunk-letter';
    if (mode !== 'letter') {
      cl.style.fontSize = 'clamp(14px, 4vw, 28px)';
      cl.style.letterSpacing = '0.1em';
    }
    cl.textContent = letter;
    const bar = document.createElement('div');
    bar.className = 'chunk-bar';
    chunk.appendChild(cl);
    chunk.appendChild(bar);
    wd.appendChild(chunk);
  });
}

function setMode(mode) {
  currentMode = mode;
  buildChunks(mode);
  rc();
  if(curAudio){try{curAudio.pause();curAudio.currentTime=0;}catch(e){}}
  document.getElementById('btnLetter').classList.toggle('active', mode==='letter');
  document.getElementById('btnSyllable').classList.toggle('active', mode==='syllable');
  document.getElementById('btnWord').classList.toggle('active', mode==='word');
  document.getElementById('instruction').textContent = mode==='word' ? 'tap the word →' : 'tap or swipe right →';
}

document.getElementById('btnLetter').addEventListener('click', e=>{e.stopPropagation();speak('btn_letters');setMode('letter');});
document.getElementById('btnSyllable').addEventListener('click', e=>{
  e.stopPropagation();

  setMode('syllable');

// Play a sound or sequence of sounds
function playSequence(sounds, idx=0) {
  if (typeof sounds === 'string') { speak(sounds); return; }
  if (!Array.isArray(sounds)) { speak(sounds); return; }
  if (idx >= sounds.length) return;
  const key = sounds[idx];
  if (!key) { playSequence(sounds, idx+1); return; }
  const src = DT_AU[key];
  if (!src) { playSequence(sounds, idx+1); return; }
  const a = new Audio(src);
  a.volume = 1.0;
  a.onended = () => playSequence(sounds, idx+1);
  a.play().catch(()=> playSequence(sounds, idx+1));
  curAudio = a; curKey = key;
}

const PH = ['d','ih','jeh','ee','t','uh','n','guh','',''];

DT_AU['d'] = 'https://tobias-blockhead.github.io/Digilingo/audio/d.mp3';

// Phoneme map D-I-G-I-T-O-N-G-U-E
const PH_KEYS = ['d','ih','jeh','ih2','t','oh','n','guh','yoo',''];

let curAudio = null;
let curKey = null;
function speak(key) {
  if (!key) return;
  const src = DT_AU[key];
  if (!src) return;
  // Only interrupt if same sound is already playing
  if (curAudio && curKey === key) {
    try { curAudio.pause(); curAudio.currentTime = 0; } catch(e){}
  }
  curKey = key;
  const a = new Audio(src);
  a.volume = 1.0;
  a.play().catch(e => console.log('Audio error:', e));
  curAudio = a;
}

function gc(){return[...document.querySelectorAll('.chunk')];}
function rc(){gc().forEach(c=>c.classList.remove('active','pressing','visited'));}

let fbt=null;
function fb(txt){
  const el=document.getElementById('feedback');
  el.textContent=txt;el.classList.add('show');
  clearTimeout(fbt);fbt=setTimeout(()=>el.classList.remove('show'),2000);
}

function getIdx(x){
  const ch=gc();
  for(let i=0;i<ch.length;i++){
    const r=ch[i].getBoundingClientRect();
    if(x>=r.left-4&&x<=r.right+4)return i;
  }
  const rs=ch.map(c=>c.getBoundingClientRect());
  if(x<rs[0].left)return 0;
  if(x>rs[rs.length-1].right)return ch.length-1;
  return -1;
}

function activate(idx){
  const ch=gc();
  if(idx<0||idx>=ch.length)return;
  for(let i=0;i<idx;i++){ch[i].classList.remove('active','pressing');ch[i].classList.add('visited');}
  const el=ch[idx];
  const modeData=MODES[currentMode];
  const snd=modeData.sounds[idx];
  el.classList.remove('visited','active');
  el.classList.add('pressing');
  setTimeout(()=>{
    el.classList.remove('pressing');
    el.classList.add('active');
    if(snd){
      const label=Array.isArray(snd)?snd.filter(s=>s).join('-'):snd;
      if(label)fb(label.toUpperCase());
      playSequence(Array.isArray(snd)?snd:[snd]);
      animWave();
    }
  },80);
}

function doTap(){
  rc();
  if(currentMode==='word'){
    // Word mode — one tap plays whole word
    activate(0);
    return;
  }
  speak('digitongue');
  fb('◆ DIGITONGUE ◆');
  animWave();
  document.getElementById('instruction').textContent='now swipe right →';
  gc().forEach((c,i)=>{
    setTimeout(()=>c.classList.add('pressing'),i*60);
    setTimeout(()=>{c.classList.remove('pressing');c.classList.add('active');},i*60+80);
    setTimeout(()=>c.classList.remove('active'),i*60+360);
  });
}

let tx=0,ty=0,t0=0,sw=false,sd=null,li=-1;
const badge=document.getElementById('badge');

badge.addEventListener('touchstart',e=>{
  const t=e.touches[0];tx=t.clientX;ty=t.clientY;t0=Date.now();
  sw=false;sd=null;li=-1;speechSynthesis&&speechSynthesis.cancel();rc();
},{passive:true});

badge.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0],dx=t.clientX-tx,dy=t.clientY-ty;
  if(!sd&&(Math.abs(dx)>8||Math.abs(dy)>8))sd=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(sd!=='h'||dx<0)return;
  sw=true;
  document.getElementById('instruction').textContent='◈ sounding out...';
  const idx=getIdx(t.clientX);if(idx===-1||idx===li)return;li=idx;activate(idx);
},{passive:false});

badge.addEventListener('touchend',e=>{
  const t=e.changedTouches[0],dx=t.clientX-tx,dt=Date.now()-t0;
  if(sw&&sd==='h'&&dx>0){
    const ch=gc(),done=ch.filter(c=>c.classList.contains('visited')||c.classList.contains('active')).length;
    if(done>=ch.length){setTimeout(()=>{speak('digitongue');fb('◆ DIGITONGUE ◆');animWave();
      document.getElementById('instruction').textContent='◆ complete ◆';},200);}
    setTimeout(rc,1200);
  }else if(!sw&&dt<300&&Math.abs(dx)<10){doTap();}
  sw=false;sd=null;
});

let md=false,mx=0;
badge.addEventListener('mousedown',e=>{md=true;mx=e.clientX;sw=false;li=-1;sd=null;rc();});
badge.addEventListener('mousemove',e=>{
  if(!md)return;const dx=e.clientX-mx;
  if(!sd&&Math.abs(dx)>8)sd='h';if(sd!=='h'||dx<0)return;sw=true;
  const idx=getIdx(e.clientX);if(idx===-1||idx===li)return;li=idx;activate(idx);
});
badge.addEventListener('mouseup',e=>{
  if(!md)return;const dx=e.clientX-mx;
  if(!sw&&Math.abs(dx)<5)doTap();
  else if(sw){
    const ch=gc(),done=ch.filter(c=>c.classList.contains('visited')||c.classList.contains('active')).length;
    if(done>=ch.length){setTimeout(()=>{speak('digitongue');fb('◆ DIGITONGUE ◆');},200);}
    setTimeout(rc,1200);
  }
  md=false;sw=false;sd=null;
});
badge.addEventListener('mouseleave',()=>{if(md){md=false;sw=false;}});
