<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Digilingo — Language Solutions Co.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Share+Tech+Mono&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #060c18;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow-x: hidden;
}

#starCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.scene {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 560px;
}

.logo-unit {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

#cubeCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.align-glow {
  position: absolute;
  width: 55%;
  height: 55%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,168,98,0.1) 0%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease;
  z-index: 1;
}

.badge-wrap {
  position: relative;
  z-index: 2;
  width: 84%;
  filter: drop-shadow(0 6px 32px rgba(0,0,0,0.9));
}

.badge-svg { width: 100%; height: auto; }

.letter-swipe {
  position: absolute;
  z-index: 10;
  cursor: pointer;
  touch-action: none;
  left: 8%; right: 8%;
  top: 27%; height: 40%;
}

.chunks-overlay {
  position: absolute;
  z-index: 11;
  left: 8%; right: 8%;
  top: 27%; height: 40%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.chunk {
  flex: 1;
  max-width: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s ease;
}

.chunk-letter {
  font-family: 'Cinzel', serif;
  font-size: clamp(16px, 4.8vw, 34px);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(175deg, #8a9aaa 0%, #c8d0d8 35%, #e8edf2 50%, #c8d0d8 65%, #8a9aaa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  transition: all 0.12s ease;
}

.chunk.active .chunk-letter {
  background: linear-gradient(155deg, #8a9aaa 0%, #c8d0d8 12%, #f0f4f8 28%, #ffffff 50%, #f0f4f8 72%, #c8d0d8 88%, #8a9aaa 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 1;
  transform: scale(1.15) translateY(-6px);
  filter: drop-shadow(0 2px 14px rgba(255,255,255,0.6));
}

.chunk.visited .chunk-letter {
  background: linear-gradient(175deg, #2a3a4a, #4a5a6a, #2a3a4a);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 0.38;
}

.phase-wrap {
  width: 70%;
  max-width: 280px;
  height: 1px;
  background: rgba(200,208,216,0.05);
  border-radius: 1px;
  overflow: hidden;
}
.phase-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #8b6840, #d4a862);
  transition: width 0.08s linear;
  box-shadow: 0 0 4px rgba(212,168,98,0.4);
}

.waveform-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  height: 20px;
  width: 100%;
  max-width: 360px;
}
.wave-bar {
  width: 2px; height: 2px;
  background: rgba(200,208,216,0.07);
  border-radius: 1px;
  transition: height 0.05s ease;
}

.feedback {
  font-family: 'Cinzel', serif;
  font-size: clamp(9px, 2.2vw, 12px);
  letter-spacing: 5px;
  background: linear-gradient(90deg, #8a9aaa, #ffffff, #8a9aaa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.3s ease;
  min-height: 16px;
  text-align: center;
}
.feedback.show { opacity: 1; transform: translateY(0); }

.instruction {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: #b88a54;
  text-transform: uppercase;
  text-align: center;
  opacity: 0.22;
}

.divider { display:flex; align-items:center; gap:12px; width:100%; max-width:320px; opacity:0.18; }
.div-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,#b88a54,transparent); }
.div-mark { font-size:7px; color:#b88a54; letter-spacing:2px; }

.tagline { text-align:center; }
.tagline-main { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(10px,2vw,13px); color:#8a9aaa; letter-spacing:1px; opacity:0.3; }
.tagline-sub { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:3px; color:#b88a54; text-transform:uppercase; margin-top:4px; opacity:0.2; }

.ripple { position:absolute; border-radius:50%; background:rgba(200,208,216,0.03); border:1px solid rgba(200,208,216,0.08); transform:scale(0); animation:ripOut 0.8s ease-out forwards; pointer-events:none; z-index:20; }
@keyframes ripOut { to { transform:scale(6); opacity:0; } }
</style>
</head>

<script>
// ── STAR FIELD ────────────────────────────────────────────────────────────────
const sc = document.getElementById('starCanvas');
const sctx = sc.getContext('2d');
let stars = [];

function initStars() {
  sc.width = window.innerWidth;
  sc.height = window.innerHeight;
  stars = [];
  const n = Math.floor((sc.width * sc.height) / 5500);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * sc.width,
      y: Math.random() * sc.height,
      r: Math.random() * 0.7 + 0.1,
      a: Math.random() * 0.18 + 0.03,
      phase: Math.random() * Math.PI * 2,
      spd: Math.random() * 0.0012 + 0.0003
    });
  }
}

function drawStars(dt) {
  sctx.clearRect(0, 0, sc.width, sc.height);
  stars.forEach(s => {
    s.phase += s.spd * dt;
    const alpha = s.a * (0.5 + 0.5 * Math.sin(s.phase));
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = `rgba(210, 220, 232, ${alpha})`;
    sctx.fill();
  });
}

initStars();
window.addEventListener('resize', initStars);

// ── 4-PLATE HARMONIC METATRON'S CUBE ─────────────────────────────────────────
//
// PLATE 1 — BOTTOM (Structure): Hex + spokes + inner subdivisions
//   CCW, speed S
//
// PLATE 2 — CENTER (Modulation): Full triangle network
//   CW, speed 2S — hidden mechanism, lower opacity
//
// PLATE 3 — TOP (Energy Overlay): Only unique connections
//   No hex, no spokes — cross connections + star tips only
//   CW, speed S
//
// PLATE 4 — OUTER RING: Static, 12 tick positions

const cc = document.getElementById('cubeCanvas');
const cctx = cc.getContext('2d');

const S  = 0.000030;  // base rad/ms — very slow
const S2 = S * 2;

let a1 = 0;   // bottom CCW
let a2 = 0;   // center CW 2x
let a3 = 0;   // top CW

function resizeCC() {
  const u = document.getElementById('logoUnit');
  cc.width = u.offsetWidth;
  cc.height = u.offsetHeight;
}

function drawBottom(cx, cy, R, col) {
  const s = cc.width / 300;
  cctx.save();
  cctx.translate(cx, cy);
  cctx.strokeStyle = col;
  cctx.fillStyle = col;

  const outerPts = [], innerPts = [];
  for (let i = 0; i < 6; i++) {
    const a = (i/6)*Math.PI*2 - Math.PI/6;
    outerPts.push([Math.cos(a)*R*s, Math.sin(a)*R*s]);
    innerPts.push([Math.cos(a)*R*0.5*s, Math.sin(a)*R*0.5*s]);
  }

  // Outer hexagon
  cctx.lineWidth = 1.0 * s;
  cctx.beginPath();
  outerPts.forEach(([x,y],i) => i===0 ? cctx.moveTo(x,y) : cctx.lineTo(x,y));
  cctx.closePath(); cctx.stroke();

  // Spokes
  cctx.lineWidth = 0.6 * s;
  outerPts.forEach(([x,y]) => {
    cctx.beginPath(); cctx.moveTo(0,0); cctx.lineTo(x,y); cctx.stroke();
  });

  // Inner hexagon
  cctx.lineWidth = 0.6 * s;
  cctx.beginPath();
  innerPts.forEach(([x,y],i) => i===0 ? cctx.moveTo(x,y) : cctx.lineTo(x,y));
  cctx.closePath(); cctx.stroke();

  // Facet lines inner to outer
  cctx.lineWidth = 0.5 * s;
  for (let i = 0; i < 6; i++) {
    const [ix,iy] = innerPts[i];
    cctx.beginPath(); cctx.moveTo(ix,iy); cctx.lineTo(outerPts[i][0],outerPts[i][1]); cctx.stroke();
    cctx.beginPath(); cctx.moveTo(ix,iy); cctx.lineTo(outerPts[(i+1)%6][0],outerPts[(i+1)%6][1]); cctx.stroke();
  }

  outerPts.forEach(([x,y]) => { cctx.beginPath(); cctx.arc(x,y,1.3*s,0,Math.PI*2); cctx.fill(); });
  innerPts.forEach(([x,y]) => { cctx.beginPath(); cctx.arc(x,y,1.0*s,0,Math.PI*2); cctx.fill(); });
  cctx.beginPath(); cctx.arc(0,0,1.5*s,0,Math.PI*2); cctx.fill();

  cctx.restore();
}

function drawCenter(cx, cy, R, col) {
  const s = cc.width / 300;
  cctx.save();
  cctx.translate(cx, cy);
  cctx.strokeStyle = col;
  cctx.fillStyle = col;
  cctx.lineWidth = 0.38 * s;

  const nodes = [[0,0]];
  for (let i = 0; i < 6; i++) {
    const a = (i/6)*Math.PI*2 - Math.PI/2;
    nodes.push([Math.cos(a)*R*s, Math.sin(a)*R*s]);
  }

  for (let i = 0; i < nodes.length; i++)
    for (let j = i+1; j < nodes.length; j++) {
      cctx.beginPath();
      cctx.moveTo(nodes[i][0], nodes[i][1]);
      cctx.lineTo(nodes[j][0], nodes[j][1]);
      cctx.stroke();
    }

  nodes.forEach(([x,y],i) => {
    cctx.beginPath(); cctx.arc(x,y,(i===0?1.4:1.0)*s,0,Math.PI*2); cctx.fill();
  });

  cctx.restore();
}

function drawTop(cx, cy, R, col) {
  const s = cc.width / 300;
  cctx.save();
  cctx.translate(cx, cy);
  cctx.strokeStyle = col;
  cctx.fillStyle = col;
  cctx.lineWidth = 0.6 * s;

  const outer = [], tips = [];
  for (let i = 0; i < 6; i++) {
    const a = (i/6)*Math.PI*2 - Math.PI/6;
    outer.push([Math.cos(a)*R*s, Math.sin(a)*R*s]);
    tips.push([Math.cos(a)*R*1.42*s, Math.sin(a)*R*1.42*s]);
  }

  // Cross connections only (no adjacent — those belong to bottom hex)
  for (let i = 0; i < 6; i++) {
    const j = (i+2)%6;
    cctx.beginPath(); cctx.moveTo(outer[i][0],outer[i][1]); cctx.lineTo(outer[j][0],outer[j][1]); cctx.stroke();
    if (i < 3) {
      cctx.beginPath(); cctx.moveTo(outer[i][0],outer[i][1]); cctx.lineTo(outer[i+3][0],outer[i+3][1]); cctx.stroke();
    }
  }

  // Star tip connections
  for (let i = 0; i < 6; i++) {
    cctx.beginPath(); cctx.moveTo(tips[i][0],tips[i][1]); cctx.lineTo(outer[(i+5)%6][0],outer[(i+5)%6][1]); cctx.stroke();
    cctx.beginPath(); cctx.moveTo(tips[i][0],tips[i][1]); cctx.lineTo(outer[(i+1)%6][0],outer[(i+1)%6][1]); cctx.stroke();
  }

  tips.forEach(([x,y]) => { cctx.beginPath(); cctx.arc(x,y,1.2*s,0,Math.PI*2); cctx.fill(); });
  outer.forEach(([x,y]) => { cctx.beginPath(); cctx.arc(x,y,0.9*s,0,Math.PI*2); cctx.fill(); });

  cctx.restore();
}

function drawRing(cx, cy, R) {
  const s = cc.width / 300;
  cctx.save();
  cctx.translate(cx, cy);
  cctx.strokeStyle = 'rgba(180,138,70,0.16)';
  cctx.lineWidth = 0.4 * s;
  cctx.beginPath(); cctx.arc(0,0,R*s,0,Math.PI*2); cctx.stroke();

  for (let i = 0; i < 12; i++) {
    const a = (i/12)*Math.PI*2 - Math.PI/2;
    const major = i%3===0;
    const r1 = R*(major?0.91:0.95)*s;
    cctx.lineWidth = (major?0.8:0.35)*s;
    cctx.beginPath();
    cctx.moveTo(Math.cos(a)*r1, Math.sin(a)*r1);
    cctx.lineTo(Math.cos(a)*R*s, Math.sin(a)*R*s);
    cctx.stroke();
    if (major) {
      cctx.fillStyle = 'rgba(212,168,98,0.45)';
      cctx.beginPath(); cctx.arc(Math.cos(a)*R*s, Math.sin(a)*R*s, 1.5*s, 0, Math.PI*2); cctx.fill();
    }
  }
  cctx.restore();
}

function getAlignment() {
  const d = Math.abs((a1 + a3) % (Math.PI/3));
  const n = d < Math.PI/6 ? d : Math.PI/3 - d;
  return Math.max(0, 1 - n/(Math.PI/18));
}

let lastT = 0;

function frame(ts) {
  const dt = Math.min(ts - lastT, 50);
  lastT = ts;

  a1 -= S  * dt;
  a2 += S2 * dt;
  a3 += S  * dt;

  cctx.clearRect(0, 0, cc.width, cc.height);

  const cx = cc.width/2, cy = cc.height/2;
  const R  = cc.width * 0.27;
  const Rc = cc.width * 0.17;
  const Rr = cc.width * 0.46;

  const al = getAlignment();
  const b  = al * 0.14;

  const c1 = `rgba(170,122,52,${0.22+b})`;
  const c2 = `rgba(212,168,98,${0.09+b*0.4})`;
  const c3 = `rgba(148,112,50,${0.17+b})`;

  cctx.save(); cctx.translate(cx,cy); cctx.rotate(a1); cctx.translate(-cx,-cy);
  drawBottom(cx, cy, R, c1);
  cctx.restore();

  cctx.save(); cctx.translate(cx,cy); cctx.rotate(a2); cctx.translate(-cx,-cy);
  drawCenter(cx, cy, Rc, c2);
  cctx.restore();

  cctx.save(); cctx.translate(cx,cy); cctx.rotate(a3); cctx.translate(-cx,-cy);
  drawTop(cx, cy, R, c3);
  cctx.restore();

  drawRing(cx, cy, Rr);

  document.getElementById('alignGlow').style.opacity = (al * 0.8).toString();
  document.getElementById('phaseFill').style.width = (al * 100) + '%';

  drawStars(dt);
  requestAnimationFrame(frame);
}

resizeCC();
window.addEventListener('resize', resizeCC);
requestAnimationFrame(frame);

// ── WAVEFORM ──────────────────────────────────────────────────────────────────
const wf = document.getElementById('waveform');
for (let i = 0; i < 44; i++) {
  const b = document.createElement('div'); b.className = 'wave-bar'; wf.appendChild(b);
}
let wvActive = false, wvTimer = null;

function animWave() {
  clearTimeout(wvTimer); wvActive = true;
  const bars = [...document.querySelectorAll('.wave-bar')];
  let f = 0;
  function tick() {
    if (!wvActive) return;
    bars.forEach((b,i) => {
      b.style.height = (2+Math.abs(Math.sin(f*0.25+i*0.35))*12+Math.random()*2)+'px';
      b.style.background = 'linear-gradient(180deg,#e8edf2,#8a9aaa)';
      b.style.opacity = '0.35';
    });
    f++; if (f < 55) requestAnimationFrame(tick); else stopWave();
  }
  requestAnimationFrame(tick);
  wvTimer = setTimeout(stopWave, 800);
}

function stopWave() {
  wvActive = false;
  document.querySelectorAll('.wave-bar').forEach(b => {
    b.style.height = '2px';
    b.style.background = 'rgba(200,208,216,0.07)';
    b.style.opacity = '1';
  });
}

// ── PHONEME INTERACTION ────────────────────────────────────────────────────────
const PH = ['d','ih','g','ih','l','ih','n','g','oh'];

function speak(txt, rate=0.6, pitch=1.05) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.rate = rate; u.pitch = pitch; u.volume = 1;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('en'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

let tx0=0,ty0=0,t0=0,isSw=false,sd=null,li=-1,ft=null;

function gc() { return [...document.querySelectorAll('.chunk')]; }
function rc() { gc().forEach(c => c.classList.remove('active','visited')); }

function sfb(txt) {
  const el = document.getElementById('feedback');
  el.textContent = txt; el.classList.add('show');
  clearTimeout(ft); ft = setTimeout(() => el.classList.remove('show'), 2000);
}

function gci(x) {
  const ch = gc();
  for (let i=0; i<ch.length; i++) {
    const r = ch[i].getBoundingClientRect();
    if (x >= r.left-6 && x <= r.right+6) return i;
  }
  const rs = ch.map(c => c.getBoundingClientRect());
  if (x < rs[0].left) return 0;
  if (x > rs[rs.length-1].right) return ch.length-1;
  return -1;
}

function doTap(cx, cy) {
  const u = document.getElementById('logoUnit');
  const rect = u.getBoundingClientRect();
  const rip = document.createElement('div'); rip.className = 'ripple'; const sz = 60;
  rip.style.cssText = `width:${sz}px;height:${sz}px;left:${cx-rect.left-sz/2}px;top:${cy-rect.top-sz/2}px`;
  u.appendChild(rip); setTimeout(() => rip.remove(), 800);
  gc().forEach((c,i) => {
    setTimeout(() => c.classList.add('active'), i*55);
    setTimeout(() => c.classList.remove('active'), i*55+300);
  });
  speak('Digilingo', 0.8, 1.05);
  animWave();
  sfb('◆ DIGILINGO ◆');
  document.getElementById('instruction').textContent = 'now swipe the letters →';
}

const swEl = document.getElementById('letterSwipe');

swEl.addEventListener('touchstart', e => {
  const t = e.touches[0]; tx0=t.clientX; ty0=t.clientY; t0=Date.now();
  isSw=false; sd=null; li=-1;
  speechSynthesis && speechSynthesis.cancel();
  stopWave(); rc();
}, {passive:true});

swEl.addEventListener('touchmove', e => {
  e.preventDefault();
  const t=e.touches[0], dx=t.clientX-tx0, dy=t.clientY-ty0;
  if (!sd && (Math.abs(dx)>8||Math.abs(dy)>8)) sd = Math.abs(dx)>Math.abs(dy)?'h':'v';
  if (sd!=='h'||dx<0) return;
  isSw=true;
  document.getElementById('instruction').textContent = '◈ reading...';
  const idx=gci(t.clientX); if(idx===-1||idx===li) return; li=idx;
  const ch=gc();
  for(let i=0;i<idx;i++){ch[i].classList.remove('active');ch[i].classList.add('visited');}
  ch[idx].classList.remove('visited'); ch[idx].classList.add('active');
  speak(PH[idx],0.55,1.1); animWave(); sfb(PH[idx].toUpperCase());
}, {passive:false});

swEl.addEventListener('touchend', e => {
  const t=e.changedTouches[0], dx=t.clientX-tx0, el=Date.now()-t0;
  if (isSw&&sd==='h'&&dx>0) {
    const ch=gc(), v=ch.filter(c=>c.classList.contains('visited')||c.classList.contains('active')).length;
    if (v===ch.length) {
      setTimeout(()=>{speak('Digilingo',0.8,1.05);animWave();sfb('◆ DIGILINGO ◆');
        document.getElementById('instruction').textContent='◆ complete ◆';},200);
    }
    setTimeout(rc,900);
  } else if (!isSw&&el<300&&Math.abs(dx)<10) { doTap(t.clientX,t.clientY); }
  isSw=false; sd=null;
});

let md=false, mx=0;
swEl.addEventListener('mousedown', e=>{md=true;mx=e.clientX;isSw=false;li=-1;sd=null;rc();stopWave();});
swEl.addEventListener('mousemove', e=>{
  if(!md) return; const dx=e.clientX-mx;
  if(!sd&&Math.abs(dx)>8) sd='h'; if(sd!=='h'||dx<0) return; isSw=true;
  const idx=gci(e.clientX); if(idx===-1||idx===li) return; li=idx;
  const ch=gc();
  for(let i=0;i<idx;i++){ch[i].classList.remove('active');ch[i].classList.add('visited');}
  ch[idx].classList.remove('visited'); ch[idx].classList.add('active');
  speak(PH[idx],0.55,1.1); animWave(); sfb(PH[idx].toUpperCase());
});
swEl.addEventListener('mouseup', e=>{
  if(!md) return; const dx=e.clientX-mx;
  if(!isSw&&Math.abs(dx)<5) doTap(e.clientX,e.clientY);
  else if(isSw){
    const ch=gc(),v=ch.filter(c=>c.classList.contains('visited')||c.classList.contains('active')).length;
    if(v===ch.length){setTimeout(()=>{speak('Digilingo',0.8,1.05);sfb('◆ DIGILINGO ◆');},200);}
    setTimeout(rc,900);
  }
  md=false; isSw=false; sd=null;
});
swEl.addEventListener('mouseleave',()=>{if(md){md=false;isSw=false;}});

if (window.speechSynthesis) speechSynthesis.getVoices();
</script>
